spring.application.name=Backend

#logging.level.org.springframework.security=trace

# Server Configuration
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api


# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/${DB_NAME}}
spring.datasource.username=${DB_USERNAME:username}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JPA/Hibernate Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.schema_validation.ignore_unknown_columns=true

# Liquibase Configuration
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

